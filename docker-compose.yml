version: '3.8'

services:
  neo4j:
    image: neo4j:5.28.0-enterprise
    restart: always
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/password123  # Change in .env
      NEO4J_PLUGINS: "\"graph-data-science\""
      NEO4J_dbms_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  api:
    build: .
    restart: always
    ports:
      - '8000:8000'
    command: uvicorn fastapi_signals:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    depends_on:
      - neo4j
    volumes:
      - .:/app

  dashboard:
    build: .
    restart: always
    ports:
      - '8501:8501'
    command: streamlit run financial_dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.enableCORS false
    env_file: .env
    depends_on:
      - api
      - neo4j
    volumes:
      - .:/app

volumes:
  neo4j_data:
  neo4j_logs:
